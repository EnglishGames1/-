<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Time of Day Challenge - המורה ליאל</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background-color: #f0f4f8; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 10px; }
        #words-container { background: #ffffff; border: 2px solid #d1d9e0; border-radius: 15px; min-height: 80px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .drop-zone { width: 140px; height: 160px; border: 3px dashed #3498db; border-radius: 15px; display: flex; align-items: center; justify-content: center; flex-direction: column; background: white; transition: 0.3s; }
        .word { padding: 10px 18px; background: #3498db; color: white; cursor: grab; border-radius: 10px; margin: 5px; font-weight: bold; box-shadow: 0 4px #2980b9; }
        .emoji-header { font-size: 40px; margin-bottom: 5px; }
        #message { font-size: 24px; font-weight: bold; margin: 10px; height: 35px; }
        .hidden { display: none !important; }
        button { padding: 12px 25px; font-size: 18px; background: #2ecc71; color: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px #27ae60; font-weight: bold; }
        
        #final-instructions { background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 1100px; margin: 10px auto; border: 4px solid #f1c40f; line-height: 1.5; }
        .instruction-step { font-size: 1.4em; margin: 10px 0; color: #2c3e50; text-align: center; }
        .big-english-words { background: #fdf9e7; padding: 20px; border-radius: 15px; font-weight: 900; font-family: 'Courier New', Courier, monospace; color: #1976d2; font-size: 2.8em; letter-spacing: 3px; border: 2px dashed #f1c40f; margin: 15px 0; display: inline-block; width: 90%; }
        .teacher-sign { margin-top: 20px; font-size: 2em; font-weight: bold; color: #e67e22; border-top: 1px solid #eee; padding-top: 15px; }
        .success-label { font-size: 13px; color: #155724; font-weight: bold; margin-top: 5px; background: #d4edda; padding: 3px; border-radius: 4px; }
    </style>
</head>
<body>

    <audio id="sound-success" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
    <audio id="sound-wrong" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>
    <audio id="sound-cheer" src="https://actions.google.com/sounds/v1/human/applause.ogg"></audio>

    <div id="game-board">
        <h1 id="level-title" style="font-size: 2em; margin: 10px;">שלב 1: שמות חלקי היום</h1>
        <div id="words-container" class="container"></div>
        <div id="zones-container" class="container"></div>
    </div>

    <div id="transition-screen" class="hidden">
        <h1 style="font-size: 3.5em; color: #2ecc71; margin-top: 40px;">כל הכבוד! ✨</h1>
        <h2 style="font-size: 2em;">ועכשיו... הוראות לפעילות אחרונה</h2>
        <br>
        <button onclick="showFinalPage()" style="font-size: 28px; padding: 20px 50px;">תעבירי דף למשימה ➔</button>
    </div>

    <div id="final-instructions" class="hidden">
        <h1 style="color: #3498db; font-size: 2.5em; margin-bottom: 10px;">📋 ההוראות הן:</h1>
        <div class="instruction-step">✂️ גזרי <strong>10 כרטיסים</strong> וכתבי על כל שניים את <strong>אותו החלק של היום:</strong></div>
        <div class="big-english-words">morning, noon, afternoon, evening, night</div>
        <div class="instruction-step">🃏 ערבבי, הפכי את הכרטיסים ושחקי <strong>משחק הזיכרון!</strong></div>
        <div class="teacher-sign">בהצלחה, המורה ליאל ❤️</div>
    </div>

    <div id="message"></div>
    <button id="nextLevelBtn" class="hidden">עבור לשלב הבא ➔</button>

    <script>
        let score = 0;
        let currentLevel = 1;

        const levels = {
            1: { title: "שלב 1: שמות חלקי היום", items: [{id:'m1',text:'Morning',target:'morning'},{id:'m2',text:'Noon',target:'noon'},{id:'m3',text:'Afternoon',target:'afternoon'},{id:'m4',text:'Evening',target:'evening'},{id:'m5',text:'Night',target:'night'}], zones: [{id:'morning',label:'בוקר',icon:'🌅'},{id:'noon',label:'צהריים',icon:'☀️'},{id:'afternoon',label:'אחה"צ',icon:'🌤️'},{id:'evening',label:'ערב',icon:'🌇'},{id:'night',label:'לילה',icon:'🌙'}] },
            2: { title: "שלב 2: מה עושים ומתי?", items: [{id:'a1',text:'🪥 צחצוח שיניים',target:'morning'},{id:'a2',text:'🍲 ארוחת צהריים',target:'noon'},{id:'a3',text:'⚽ משחק בחוץ',target:'afternoon'},{id:'a4',text:'🥘 ארוחת ערב',target:'evening'},{id:'a5',text:'🛌 הולכים לישון',target:'night'}], zones: [{id:'morning',label:'Morning',icon:'🌅'},{id:'noon',label:'Noon',icon:'☀️'},{id:'afternoon',label:'Afternoon',icon:'🌤️'},{id:'evening',label:'Evening',icon:'🌇'},{id:'night',label:'Night',icon:'🌙'}] },
            3: { title: "שלב 3: שעות", items: [{id:'t1',text:'08:00 בבוקר',target:'morning'},{id:'t2',text:'12:00 בצהריים',target:'noon'},{id:'t3',text:'16:00 אחה"צ',target:'afternoon'},{id:'t4',text:'19:30 בערב',target:'evening'},{id:'t5',text:'23:00 בלילה',target:'night'}], zones: [{id:'morning',label:'Morning',icon:'🌅'},{id:'noon',label:'Noon',icon:'☀️'},{id:'afternoon',label:'Afternoon',icon:'🌤️'},{id:'evening',label:'Evening',icon:'🌇'},{id:'night',label:'Night',icon:'🌙'}] }
        };

        function playSfx(id) {
            const s = document.getElementById(id);
            if (s) { s.currentTime = 0; s.play().catch(()=>{}); }
        }

        function loadLevel(lv) {
            score = 0;
            const data = levels[lv];
            document.getElementById('level-title').innerText = data.title;
            const msg = document.getElementById('message');
            msg.innerText = "";
            msg.style.color = "#2e7d32";
            document.getElementById('nextLevelBtn').classList.add('hidden');
            const wordsBox = document.getElementById('words-container');
            const zonesBox = document.getElementById('zones-container');
            wordsBox.innerHTML = ''; zonesBox.innerHTML = '';

            // ערבוב חזק של המילים
            const shuffledItems = [...data.items].sort(() => Math.random() - 0.5);
            shuffledItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'word'; div.draggable = true; div.id = item.id;
                div.innerText = item.text; div.setAttribute('data-target', item.target);
                div.ondragstart = (e) => e.dataTransfer.setData('text', e.target.id);
                wordsBox.appendChild(div);
            });

            // השארת סדר קבוע לתיבות כדי שלא יבלבל
            data.zones.forEach(z => {
                const div = document.createElement('div');
                div.className = 'drop-zone'; div.setAttribute('data-id', z.id);
                div.innerHTML = `<span class="emoji-header">${z.icon}</span><p style="margin:2px">${z.label}</p>`;
                div.ondragover = (e) => e.preventDefault();
                div.ondrop = handleDrop;
                zonesBox.appendChild(div);
            });
        }

        function handleDrop(e) {
            const draggedId = e.dataTransfer.getData('text');
            const draggedEl = document.getElementById(draggedId);
            const correctTarget = draggedEl.getAttribute('data-target');
            const zoneId = this.getAttribute('data-id');
            const msg = document.getElementById('message');

            if (correctTarget === zoneId) {
                playSfx('sound-success');
                this.style.background = '#d4edda';
                draggedEl.style.display = 'none';
                const label = document.createElement('div');
                label.className = 'success-label';
                label.innerText = draggedEl.innerText;
                this.appendChild(label);
                msg.innerText = "מעולה! ✨";
                msg.style.color = "#2e7d32";
                score++;
                if(score === 5) {
                    playSfx('sound-cheer');
                    if(currentLevel < 3) {
                        msg.innerText = "כל הכבוד! עברת שלב 🏆";
                        document.getElementById('nextLevelBtn').classList.remove('hidden');
                    } else { showTransition(); }
                }
            } else {
                playSfx('sound-wrong');
                msg.innerText = "שגיאה, נסה שוב! ❌";
                msg.style.color = "red";
            }
        }

        function showTransition() {
            document.getElementById('game-board').classList.add('hidden');
            document.getElementById('message').classList.add('hidden');
            document.getElementById('transition-screen').classList.remove('hidden');
        }

        function showFinalPage() {
            document.getElementById('transition-screen').classList.add('hidden');
            document.getElementById('final-instructions').classList.remove('hidden');
        }

        document.getElementById('nextLevelBtn').onclick = () => {
            currentLevel++;
            loadLevel(currentLevel);
        };

        loadLevel(1);
    </script>
</body>
</html>
